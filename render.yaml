services:
  - type: web
    name: amazon-fresh-scraper
    runtime: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    # All values are set in the Render dashboard → Environment.
    # sync: false means "do not check this value into render.yaml".
    envVars:
      # ── Amazon login (required) ──────────────────────────────────────────
      - key: AMAZON_USERNAME
        sync: false
      - key: AMAZON_PASSWORD
        sync: false

      # ── Salesforce sync (optional — leave blank to skip sync) ────────────
      - key: SF_TOKEN_URL
        sync: false
      - key: SF_CLIENT_ID
        sync: false
      - key: SF_CLIENT_SECRET
        sync: false
      - key: SF_API_ENDPOINT
        sync: false

      # ── Runtime ──────────────────────────────────────────────────────────
      - key: HEADLESS
        value: "true"
      # Default number of recent Fresh orders to scrape (POST body overrides).
      - key: ORDERS_TO_SCRAPE
        value: "10"

      # ── Delivery location (sets Amazon "Deliver to" so Fresh items show ───
      #    correct availability/price) ────────────────────────────────────
      # Preferred saved address (substring match). Account-specific, so set it
      # in the dashboard; if left unset the code falls back to its built-in
      # default. Only used when a matching saved address exists for the account.
      - key: DELIVERY_ADDRESS_PREFIX
        sync: false
      # Pincode fallback used when no saved address matches the prefix above.
      - key: DELIVERY_PINCODE
        value: "560094"
